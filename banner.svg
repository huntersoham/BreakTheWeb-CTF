<svg width="100%" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- flicker animation -->
    <style>
      .glow-text {
        font-family: monospace;
        fill: #00ff41;
        font-weight: bold;
        animation: flicker 1.5s infinite alternate;
      }

      .sub {
        font-family: monospace;
        fill: #9ca3af;
      }

      .cmd {
        font-family: monospace;
        fill: #00ff41;
        opacity: 0.8;
      }

      @keyframes flicker {
        0%   { opacity: 1; }
        45%  { opacity: 0.8; }
        50%  { opacity: 0.3; }
        55%  { opacity: 1; }
        100% { opacity: 0.9; }
      }
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="260" fill="#0d1117"/>

  <!-- main title -->
  <text x="50%" y="90" text-anchor="middle"
        font-size="44"
        class="glow-text"
        filter="url(#glow)">
    BREAKTHEWEB CTF
  </text>

  <!-- subtitle -->
  <text x="50%" y="135" text-anchor="middle"
        font-size="16"
        class="sub">
    Think like an attacker. Break like a hacker. Learn like a defender.
  </text>

  <!-- terminal line -->
  <text x="50%" y="175" text-anchor="middle"
        font-size="14"
        class="cmd">
    &gt; huntersoham@kali:~$ initializing_security_labs...
  </text>

  <!-- bottom line -->
  <line x1="320" y1="210" x2="880" y2="210"
        stroke="#00ff41" stroke-opacity="0.3"/>

</svg>
